        <div class="songBanner"></div>

    <div class="bottom">
        <div class="progressContainer">
        <div class="progressFill" id="progressFill"></div>
        <input type="range" name="range" id="myProgressBar" value="0" min="0" max="100">
        </div>
        <div class="icons">
            <!-- fontawesome icons -->
            <div class="masterBackward" id="previous" ><i class="fa-solid fa-2x fa-backward-fast"></i></div>
            <div id="masterPlay" class="playToggle">
                <i class="fa-solid fa-2x fa-circle-play iconPlay"></i>
                <i class="fa-solid fa-2x fa-circle-pause iconPause" style="display:none;"></i>
            </div>
            <div class="masterForward" id="forward"><i class="fa-solid fa-2x fa-forward-fast"></i></div> 

        </div>
        <div class="songInfo">
            <img src="playing.gif" width="42px" alt="" id="gif"> <span id="masterSongName"> Let me love you - Justin Beiber </span>
            <span id="masterCurrentTime">0:00</span> / <span id="masterMaxDuration">0:00</span>
